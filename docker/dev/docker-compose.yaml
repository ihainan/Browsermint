# Development Docker Compose for Browsermint
#
# Provides only the external dependencies needed to run backend and frontend locally.
# Start with: docker compose up -d
#
# Backend DATABASE_URL:
#   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/${POSTGRES_DB}
#   e.g. postgresql://browsermint:browsermint_dev_2026@localhost:24720/browsermint

name: browsermint-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-browsermint-postgres-dev}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-browsermint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-browsermint}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-35433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - browsermint-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-browsermint} -d ${POSTGRES_DB:-browsermint}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  browsermint-internal:
    name: browsermint-internal
    driver: bridge
