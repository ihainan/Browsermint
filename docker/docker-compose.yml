name: steelyard

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steelyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-steelyard}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ${POSTGRES_DATA_DIR:?POSTGRES_DATA_DIR is required}:/var/lib/postgresql/data
    networks:
      - steelyard-public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steelyard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${BACKEND_DOCKERFILE:-docker/Dockerfile.backend}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-steelyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-steelyard}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_SESSION_TOKEN_SECRET: ${JWT_SESSION_TOKEN_SECRET:?JWT_SESSION_TOKEN_SECRET is required}
      DOCKER_NETWORK_NAME: ${DOCKER_NETWORK_NAME:-steelyard-internal}
      STEEL_BROWSER_IMAGE: ${STEEL_BROWSER_IMAGE:-ghcr.io/steel-dev/steel-browser-api:latest}
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - steelyard-public
      - steelyard-internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ${BUILD_CONTEXT:-..}
      dockerfile: ${FRONTEND_DOCKERFILE:-docker/Dockerfile.frontend}
    networks:
      - steelyard-public
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-24700}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - steelyard-public
    depends_on:
      - backend
      - frontend

networks:
  steelyard-public:
    driver: bridge
  steelyard-internal:
    name: ${DOCKER_NETWORK_NAME:-steelyard-internal}
    driver: bridge
