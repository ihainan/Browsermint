name: Docker E2E

on:
  workflow_dispatch:

jobs:
  docker-e2e:
    name: Real Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python E2E dependencies
        run: python -m pip install --upgrade requests websockets

      - name: Run Docker E2E
        run: make test-e2e-down

